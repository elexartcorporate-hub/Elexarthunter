# Nginx vhost — Full-stack (React build + reverse proxy backend FastAPI/Node)
# Frontend: __WEBROOT__/frontend/build
# Backend : http://127.0.0.1:__PORT__  (semua request /api/* di-proxy ke sini)
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Akan otomatis di-update oleh certbot ke 443 dengan SSL.
    root __WEBROOT__/frontend/build;
    index index.html;

    # Logging
    access_log /var/log/nginx/__DOMAIN__.access.log;
    error_log  /var/log/nginx/__DOMAIN__.error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Max upload 50 MB (sesuaikan)
    client_max_body_size 50M;

    # API → backend
    location /api/ {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # SPA fallback — semua route React di-handle index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets statis
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
